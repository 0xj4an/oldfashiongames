<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Old Fashion Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100%;
            min-height: 100dvh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            padding: 10px;
            padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            -webkit-overflow-scrolling: touch;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        canvas {
            display: block;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            height: auto;
            touch-action: none;
            -webkit-touch-callout: none;
            cursor: pointer;
        }

        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.3s;
        }

        #loadingScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loadingScreen span {
            color: #535353;
            font-family: monospace;
            font-size: 14px;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        #nameOverlay {
            display: none;
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 280px;
        }

        #nameInput {
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            padding: 12px 16px;
            width: 100%;
            border: 2px solid #535353;
            border-radius: 4px;
            text-align: center;
            outline: none;
            -webkit-user-select: auto;
            user-select: auto;
            background: #fff;
        }

        #saveBtn, #skipBtn {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 12px 20px;
            margin: 10px 4px 0;
            cursor: pointer;
            border: 2px solid #535353;
            border-radius: 4px;
            background: #fff;
            min-height: 44px;
            min-width: 80px;
        }

        #saveBtn:hover, #skipBtn:hover,
        #saveBtn:active, #skipBtn:active {
            background: #535353;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="loadingScreen"><span>LOADING...</span></div>
    <div id="gameContainer">
        <canvas id="game" width="400" height="600"></canvas>
        <div id="nameOverlay">
            <input id="nameInput" type="text" maxlength="15" placeholder="Your name" autocomplete="off" autocapitalize="off" autocorrect="off">
            <br>
            <button id="saveBtn">SAVE</button>
            <button id="skipBtn">SKIP</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const nameOverlay = document.getElementById('nameOverlay');
        const nameInput = document.getElementById('nameInput');
        const saveBtn = document.getElementById('saveBtn');
        const skipBtn = document.getElementById('skipBtn');

        const COLORS = {
            background: '#f7f7f7',
            ground: '#535353',
            dino: '#535353',
            pipe: '#73bf2e',
            pipeCap: '#558c22',
            text: '#535353',
            overlay: 'rgba(0, 0, 0, 0.5)',
            cloud: '#d3d3d3',
            cactus: '#535353'
        };

        const BACK_BTN = { x: 350, y: 8, w: 42, h: 42 };
        const SWIPE_THRESHOLD = 50;
        let touchStartX = 0;
        let touchStartY = 0;

        // Hover/keyboard selection index (-1 = none)
        let menuHover = -1;
        let diffHover = -1;
        let mouseX = -1;
        let mouseY = -1;

        let currentGame = 'menu';
        let gameState = 'menu';
        let score = 0;
        let shakeTimer = 0;
        let flashTimer = 0;
        let selectedDifficulty = 'intermediate';
        let leaderboardData = {};
        let leaderboardTab = 'dino';
        let leaderboardDifficulty = 'beginner';
        let scoreSaved = false;

        const GROUND_HEIGHT = 80;
        const DINO_WIDTH = 40;
        const DINO_HEIGHT = 44;

        // Difficulty presets
        const DIFFICULTY = {
            dino: {
                beginner:     { BASE_SPEED: 3,   GRAVITY: 0.3,  JUMP_VELOCITY: -9,  SPEED_INC: 0.3 },
                intermediate: { BASE_SPEED: 4,   GRAVITY: 0.35, JUMP_VELOCITY: -10, SPEED_INC: 0.5 },
                advanced:     { BASE_SPEED: 6,   GRAVITY: 0.5,  JUMP_VELOCITY: -12, SPEED_INC: 0.7 }
            },
            flappy: {
                beginner:     { PIPE_SPEED: 1.5, PIPE_GAP: 200, PIPE_SPACING: 350, GRAVITY: 0.3,  JUMP_VELOCITY: -7, MAX_FALL_SPEED: 6,  SPEED_INC: 0.2, GAP_DEC: 3 },
                intermediate: { PIPE_SPEED: 2,   PIPE_GAP: 180, PIPE_SPACING: 300, GRAVITY: 0.35, JUMP_VELOCITY: -7, MAX_FALL_SPEED: 6,  SPEED_INC: 0.3, GAP_DEC: 5 },
                advanced:     { PIPE_SPEED: 3,   PIPE_GAP: 140, PIPE_SPACING: 220, GRAVITY: 0.5,  JUMP_VELOCITY: -9, MAX_FALL_SPEED: 10, SPEED_INC: 0.4, GAP_DEC: 5 }
            }
        };

        const flappyGame = {
            PIPE_WIDTH: 55,
            PIPE_GAP: 180,
            PIPE_SPACING: 300,
            PIPE_SPEED: 2,
            BASE_PIPE_SPEED: 2,
            BASE_PIPE_GAP: 180,
            GRAVITY: 0.35,
            JUMP_VELOCITY: -7,
            MAX_FALL_SPEED: 6,
            SPEED_INC: 0.3,
            GAP_DEC: 5,
            bestScore: parseInt(localStorage.getItem('dinoFlappyBest')) || 0,
            dino: { x: 60, y: 300, width: DINO_WIDTH, height: DINO_HEIGHT, velocity: 0, rotation: 0 },
            pipes: [],
            pipesPassed: 0
        };

        const dinoGame = {
            GRAVITY: 0.35,
            JUMP_VELOCITY: -10,
            BASE_SPEED: 4,
            SPEED: 4,
            SPEED_INC: 0.5,
            bestScore: parseInt(localStorage.getItem('dinoRunnerBest')) || 0,
            dino: { x: 50, y: 476, width: DINO_WIDTH, height: DINO_HEIGHT, velocity: 0, groundY: 476 },
            obstacles: [],
            clouds: [],
            ground: { x: 0 }
        };

        function applyDifficulty(gameType, difficulty) {
            selectedDifficulty = difficulty;
            const preset = DIFFICULTY[gameType][difficulty];

            if (gameType === 'dino') {
                dinoGame.BASE_SPEED = preset.BASE_SPEED;
                dinoGame.SPEED = preset.BASE_SPEED;
                dinoGame.GRAVITY = preset.GRAVITY;
                dinoGame.JUMP_VELOCITY = preset.JUMP_VELOCITY;
                dinoGame.SPEED_INC = preset.SPEED_INC;
            } else {
                flappyGame.BASE_PIPE_SPEED = preset.PIPE_SPEED;
                flappyGame.PIPE_SPEED = preset.PIPE_SPEED;
                flappyGame.BASE_PIPE_GAP = preset.PIPE_GAP;
                flappyGame.PIPE_GAP = preset.PIPE_GAP;
                flappyGame.PIPE_SPACING = preset.PIPE_SPACING;
                flappyGame.GRAVITY = preset.GRAVITY;
                flappyGame.JUMP_VELOCITY = preset.JUMP_VELOCITY;
                flappyGame.MAX_FALL_SPEED = preset.MAX_FALL_SPEED;
                flappyGame.SPEED_INC = preset.SPEED_INC;
                flappyGame.GAP_DEC = preset.GAP_DEC;
            }
        }

        function drawDinoSprite(x, y, rotation = 0) {
            ctx.save();
            ctx.translate(x + DINO_WIDTH / 2, y + DINO_HEIGHT / 2);
            ctx.rotate(rotation);

            ctx.fillStyle = COLORS.dino;
            ctx.fillRect(-20, -22, 40, 44);

            ctx.fillStyle = COLORS.background;
            ctx.fillRect(8, -16, 6, 6);
            ctx.fillRect(-20, -22, 12, 4);

            ctx.restore();
        }

        function drawMenu() {
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = COLORS.dino;
            ctx.font = '20px "Press Start 2P", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('OLD FASHION', canvas.width / 2, 120);
            ctx.fillText('GAMES', canvas.width / 2, 150);

            ctx.fillStyle = COLORS.ground;
            ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, 2);

            const dinoX = canvas.width / 2 - 20;
            const dinoY = canvas.height / 2 - 80;
            drawDinoSprite(dinoX, dinoY);

            const menuItems = ['DINO RUN', 'FLAPPY', 'LEADERBOARD'];
            const menuY = [355, 410, 465];
            ctx.font = '14px "Press Start 2P", monospace';

            // Detect mouse hover
            if (mouseX >= 0) {
                for (let i = 0; i < menuY.length; i++) {
                    if (mouseY > menuY[i] - 25 && mouseY < menuY[i] + 5) {
                        menuHover = i;
                        break;
                    }
                }
            }

            menuItems.forEach((label, i) => {
                const hovered = menuHover === i;
                if (hovered) {
                    ctx.fillStyle = COLORS.dino;
                    ctx.fillRect(40, menuY[i] - 20, 320, 30);
                    ctx.fillStyle = '#fff';
                } else {
                    ctx.fillStyle = COLORS.text;
                }
                ctx.fillText(label, canvas.width / 2, menuY[i]);
            });

            ctx.font = '9px "Press Start 2P", monospace';
            ctx.fillStyle = '#888';
            ctx.fillText('Tap to select', canvas.width / 2, 530);
        }

        function drawDifficultySelect() {
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = COLORS.dino;
            ctx.font = '16px "Press Start 2P", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('SELECT', canvas.width / 2, 120);
            ctx.fillText('DIFFICULTY', canvas.width / 2, 150);

            const dinoX = canvas.width / 2 - 20;
            drawDinoSprite(dinoX, 220);

            const diffItems = ['BEGINNER', 'INTERMEDIATE', 'ADVANCED'];
            const diffY = [340, 395, 450];
            ctx.font = '14px "Press Start 2P", monospace';

            // Detect mouse hover
            if (mouseX >= 0) {
                for (let i = 0; i < diffY.length; i++) {
                    if (mouseY > diffY[i] - 25 && mouseY < diffY[i] + 5) {
                        diffHover = i;
                        break;
                    }
                }
            }

            diffItems.forEach((label, i) => {
                const hovered = diffHover === i;
                if (hovered) {
                    ctx.fillStyle = COLORS.dino;
                    ctx.fillRect(40, diffY[i] - 20, 320, 30);
                    ctx.fillStyle = '#fff';
                } else {
                    ctx.fillStyle = COLORS.text;
                }
                ctx.fillText(label, canvas.width / 2, diffY[i]);
            });

            ctx.font = '9px "Press Start 2P", monospace';
            ctx.fillStyle = '#888';
            ctx.fillText('Tap [X] to go back', canvas.width / 2, 520);
        }

        function drawLeaderboard() {
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = COLORS.dino;
            ctx.font = '14px "Press Start 2P", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('LEADERBOARD', canvas.width / 2, 30);

            // Difficulty tabs — drawn as clickable buttons
            const diffs = ['beginner', 'intermediate', 'advanced'];
            const diffLabels = ['BEG', 'INT', 'ADV'];
            const diffX = [67, 200, 333];
            const diffW = 100;
            ctx.font = '9px "Press Start 2P", monospace';
            diffs.forEach((d, i) => {
                const active = leaderboardDifficulty === d;
                // Draw button background
                ctx.fillStyle = active ? COLORS.dino : '#e0e0e0';
                ctx.fillRect(diffX[i] - diffW / 2, 40, diffW, 28);
                // Draw label
                ctx.fillStyle = active ? '#fff' : '#888';
                ctx.fillText(diffLabels[i], diffX[i], 59);
            });

            // Game tabs — drawn as clickable buttons
            ctx.font = '10px "Press Start 2P", monospace';
            const gameTabW = 160;
            // Dino tab
            const dinoActive = leaderboardTab === 'dino';
            ctx.fillStyle = dinoActive ? COLORS.dino : '#e0e0e0';
            ctx.fillRect(100 - gameTabW / 2, 74, gameTabW, 28);
            ctx.fillStyle = dinoActive ? '#fff' : '#888';
            ctx.fillText('DINO RUN', 100, 93);
            // Flappy tab
            const flappyActive = leaderboardTab === 'flappy';
            ctx.fillStyle = flappyActive ? COLORS.dino : '#e0e0e0';
            ctx.fillRect(300 - gameTabW / 2, 74, gameTabW, 28);
            ctx.fillStyle = flappyActive ? '#fff' : '#888';
            ctx.fillText('FLAPPY', 300, 93);

            // Headers
            ctx.font = '8px "Press Start 2P", monospace';
            ctx.fillStyle = '#888';
            ctx.textAlign = 'left';
            ctx.fillText('#', 20, 115);
            ctx.fillText('NAME', 50, 115);
            ctx.fillText('SCORE', 280, 115);

            ctx.fillStyle = COLORS.ground;
            ctx.fillRect(15, 120, 370, 1);

            // Scores
            const data = leaderboardData[leaderboardTab] || [];
            ctx.font = '9px "Press Start 2P", monospace';

            if (data.length === 0) {
                ctx.fillStyle = '#aaa';
                ctx.textAlign = 'center';
                ctx.fillText('No scores yet', canvas.width / 2, 200);
            } else {
                data.forEach((entry, i) => {
                    const y = 145 + i * 38;
                    ctx.fillStyle = i < 3 ? '#d4a017' : COLORS.text;
                    ctx.textAlign = 'left';
                    ctx.fillText((i + 1) + '.', 20, y);
                    ctx.fillText(entry.player_name, 50, y);
                    ctx.textAlign = 'right';
                    ctx.fillText(entry.score.toString(), 370, y);
                });
            }

            ctx.font = '7px "Press Start 2P", monospace';
            ctx.fillStyle = '#888';
            ctx.textAlign = 'center';
            ctx.fillText('Click tabs to switch  [X] back', canvas.width / 2, 570);
        }

        function drawBackButton() {
            if (currentGame === 'menu') return;

            const b = BACK_BTN;
            ctx.globalAlpha = gameState === 'playing' ? 0.4 : 1;
            ctx.fillStyle = '#ddd';
            ctx.fillRect(b.x, b.y, b.w, b.h);

            ctx.strokeStyle = '#535353';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(b.x + 12, b.y + 12);
            ctx.lineTo(b.x + b.w - 12, b.y + b.h - 12);
            ctx.moveTo(b.x + b.w - 12, b.y + 12);
            ctx.lineTo(b.x + 12, b.y + b.h - 12);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        function draw() {
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentGame === 'menu') {
                drawMenu();
            } else if (currentGame === 'difficulty') {
                drawDifficultySelect();
            } else if (currentGame === 'leaderboard') {
                drawLeaderboard();
            } else if (currentGame === 'dino') {
                drawDinoGame();
            } else if (currentGame === 'flappy') {
                drawFlappyGame();
            }

            drawBackButton();
        }

        function drawDinoGame() {
            const game = dinoGame;

            ctx.fillStyle = COLORS.cloud;
            game.clouds.forEach(cloud => {
                ctx.fillRect(cloud.x, cloud.y, 40, 15);
                ctx.fillRect(cloud.x + 10, cloud.y - 10, 20, 15);
            });

            ctx.fillStyle = COLORS.ground;
            ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, 2);

            for (let i = 0; i < canvas.width; i += 20) {
                const x = (i - (game.ground.x % 20));
                if (x > -5 && x < canvas.width + 5) {
                    ctx.fillRect(x, canvas.height - GROUND_HEIGHT + 10, 10, 2);
                }
            }

            game.obstacles.forEach(obs => {
                ctx.fillStyle = COLORS.cactus;
                if (obs.type === 'small') {
                    ctx.fillRect(obs.x, obs.y, 20, 40);
                    ctx.fillRect(obs.x + 5, obs.y + 10, 10, 30);
                } else {
                    ctx.fillRect(obs.x, obs.y, 25, 50);
                    ctx.fillRect(obs.x - 5, obs.y + 15, 10, 25);
                    ctx.fillRect(obs.x + 15, obs.y + 10, 10, 20);
                }
            });

            drawDinoSprite(game.dino.x, game.dino.y);

            if (gameState === 'playing' || gameState === 'ready') {
                ctx.fillStyle = COLORS.text;
                ctx.font = '32px "Press Start 2P", monospace';
                ctx.textAlign = 'center';
                ctx.fillText(score.toString().padStart(3, '0'), canvas.width / 2, 50);

                // Show current speed indicator
                ctx.font = '8px "Press Start 2P", monospace';
                ctx.fillStyle = '#aaa';
                ctx.fillText('SPD: ' + game.SPEED.toFixed(1), canvas.width / 2, 70);
            }

            drawDinoOverlay();
            drawDinoReady();
        }

        function drawDinoOverlay() {
            if (gameState !== 'gameover') return;

            ctx.fillStyle = COLORS.overlay;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';

            ctx.font = '24px "Press Start 2P", monospace';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 60);

            ctx.font = '16px "Press Start 2P", monospace';
            ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillText('Best: ' + dinoGame.bestScore, canvas.width / 2, canvas.height / 2 + 10);

            if (scoreSaved) {
                ctx.font = '10px "Press Start 2P", monospace';
                ctx.fillStyle = '#7f7';
                ctx.fillText('Score Saved!', canvas.width / 2, canvas.height / 2 + 45);
                ctx.fillStyle = '#fff';
                ctx.font = '12px "Press Start 2P", monospace';
                ctx.fillText('TAP TO RESTART', canvas.width / 2, canvas.height / 2 + 90);
                ctx.font = '10px "Press Start 2P", monospace';
                ctx.fillText('[Change Level]', canvas.width / 2, canvas.height / 2 + 130);
                ctx.fillText('[Menu]', canvas.width / 2, canvas.height / 2 + 170);
            }
        }

        function drawDinoReady() {
            if (gameState !== 'ready') return;

            ctx.fillStyle = COLORS.text;
            ctx.textAlign = 'center';
            ctx.font = '14px "Press Start 2P", monospace';
            ctx.fillText('Tap to Start', canvas.width / 2, canvas.height / 2);

            ctx.font = '9px "Press Start 2P", monospace';
            ctx.fillStyle = '#888';
            const diffLabel = selectedDifficulty.toUpperCase();
            ctx.fillText(diffLabel, canvas.width / 2, canvas.height / 2 + 30);
        }

        function drawFlappyGame() {
            const game = flappyGame;

            game.pipes.forEach(pipe => {
                ctx.fillStyle = COLORS.pipe;

                ctx.fillRect(pipe.x, 0, game.PIPE_WIDTH, pipe.gapY);

                ctx.fillStyle = COLORS.pipeCap;
                ctx.fillRect(pipe.x - 4, pipe.gapY - 24, game.PIPE_WIDTH + 8, 24);

                const bottomPipeY = pipe.gapY + pipe.gap;
                const bottomHeight = canvas.height - GROUND_HEIGHT - bottomPipeY;

                ctx.fillStyle = COLORS.pipe;
                ctx.fillRect(pipe.x, bottomPipeY, game.PIPE_WIDTH, bottomHeight);

                ctx.fillStyle = COLORS.pipeCap;
                ctx.fillRect(pipe.x - 4, bottomPipeY, game.PIPE_WIDTH + 8, 24);
            });

            ctx.fillStyle = COLORS.ground;
            ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, 2);

            drawDinoSprite(game.dino.x, game.dino.y, game.dino.rotation);

            if (gameState === 'playing' || gameState === 'ready') {
                ctx.fillStyle = COLORS.text;
                ctx.font = '32px "Press Start 2P", monospace';
                ctx.textAlign = 'center';
                ctx.fillText(score.toString().padStart(3, '0'), canvas.width / 2, 50);

                ctx.font = '8px "Press Start 2P", monospace';
                ctx.fillStyle = '#aaa';
                ctx.fillText('SPD: ' + game.PIPE_SPEED.toFixed(1), canvas.width / 2, 70);
            }

            drawFlappyOverlay();
            drawFlappyReady();
        }

        function drawFlappyOverlay() {
            if (gameState !== 'gameover') return;

            ctx.fillStyle = COLORS.overlay;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';

            ctx.font = '24px "Press Start 2P", monospace';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 60);

            ctx.font = '16px "Press Start 2P", monospace';
            ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillText('Best: ' + flappyGame.bestScore, canvas.width / 2, canvas.height / 2 + 10);

            if (scoreSaved) {
                ctx.font = '10px "Press Start 2P", monospace';
                ctx.fillStyle = '#7f7';
                ctx.fillText('Score Saved!', canvas.width / 2, canvas.height / 2 + 45);
                ctx.fillStyle = '#fff';
                ctx.font = '12px "Press Start 2P", monospace';
                ctx.fillText('TAP TO RESTART', canvas.width / 2, canvas.height / 2 + 90);
                ctx.font = '10px "Press Start 2P", monospace';
                ctx.fillText('[Change Level]', canvas.width / 2, canvas.height / 2 + 130);
                ctx.fillText('[Menu]', canvas.width / 2, canvas.height / 2 + 170);
            }
        }

        function drawFlappyReady() {
            if (gameState !== 'ready') return;

            ctx.fillStyle = COLORS.text;
            ctx.textAlign = 'center';
            ctx.font = '14px "Press Start 2P", monospace';
            ctx.fillText('Tap to Start', canvas.width / 2, canvas.height / 2);

            ctx.font = '9px "Press Start 2P", monospace';
            ctx.fillStyle = '#888';
            const diffLabel = selectedDifficulty.toUpperCase();
            ctx.fillText(diffLabel, canvas.width / 2, canvas.height / 2 + 30);
        }

        function spawnFlappyPipe() {
            const game = flappyGame;
            const minGap = 120;
            const maxGap = canvas.height - GROUND_HEIGHT - 120;
            const gapY = Math.random() * (maxGap - minGap - game.PIPE_GAP) + minGap;

            game.pipes.push({
                x: canvas.width,
                gapY: gapY,
                gap: game.PIPE_GAP,
                passed: false
            });
        }

        function updateFlappyGame() {
            if (gameState !== 'playing') return;

            const game = flappyGame;
            const dino = game.dino;

            dino.velocity += game.GRAVITY;
            if (dino.velocity > game.MAX_FALL_SPEED) {
                dino.velocity = game.MAX_FALL_SPEED;
            }
            dino.y += dino.velocity;

            dino.rotation = Math.min(Math.PI / 4, dino.velocity * 0.1);
            if (dino.velocity < 0) {
                dino.rotation = -0.3;
            }

            if (dino.y < 0) {
                dino.y = 0;
                dino.velocity = 0;
            }

            if (dino.y + dino.height > canvas.height - GROUND_HEIGHT) {
                doGameOver('flappy');
                return;
            }

            if (game.pipes.length === 0 || game.pipes[game.pipes.length - 1].x < canvas.width - game.PIPE_SPACING) {
                spawnFlappyPipe();
            }

            for (let i = game.pipes.length - 1; i >= 0; i--) {
                const pipe = game.pipes[i];
                pipe.x -= game.PIPE_SPEED;

                if (!pipe.passed && pipe.x + game.PIPE_WIDTH < dino.x) {
                    pipe.passed = true;
                    score++;
                    game.pipesPassed++;

                    // Progressive difficulty every 10 pipes
                    if (game.pipesPassed % 10 === 0) {
                        game.PIPE_SPEED = game.BASE_PIPE_SPEED + (game.pipesPassed / 10) * game.SPEED_INC;
                        game.PIPE_GAP = Math.max(100, game.BASE_PIPE_GAP - (game.pipesPassed / 10) * game.GAP_DEC);
                    }
                }

                if (pipe.x + game.PIPE_WIDTH < 0) {
                    game.pipes.splice(i, 1);
                    continue;
                }

                const dinoLeft = dino.x + 8;
                const dinoRight = dino.x + dino.width - 8;
                const dinoTop = dino.y + 8;
                const dinoBottom = dino.y + dino.height - 8;

                const pipeLeft = pipe.x;
                const pipeRight = pipe.x + game.PIPE_WIDTH;
                const topPipeBottom = pipe.gapY;
                const bottomPipeTop = pipe.gapY + pipe.gap;

                if (dinoRight > pipeLeft && dinoLeft < pipeRight) {
                    if (dinoTop < topPipeBottom || dinoBottom > bottomPipeTop) {
                        doGameOver('flappy');
                        return;
                    }
                }
            }
        }

        function spawnDinoObstacle() {
            const game = dinoGame;
            const type = Math.random() > 0.5 ? 'small' : 'large';
            const y = canvas.height - GROUND_HEIGHT - (type === 'small' ? 40 : 50);

            game.obstacles.push({
                x: canvas.width,
                y: y,
                width: type === 'small' ? 20 : 25,
                height: type === 'small' ? 40 : 50,
                type: type
            });
        }

        function spawnDinoCloud() {
            const game = dinoGame;
            game.clouds.push({
                x: canvas.width,
                y: Math.random() * 200 + 50,
                speed: 0.5 + Math.random() * 0.5
            });
        }

        function updateDinoGame() {
            if (gameState !== 'playing') return;

            const game = dinoGame;
            const dino = game.dino;

            dino.velocity += game.GRAVITY;
            dino.y += dino.velocity;

            if (dino.y > dino.groundY) {
                dino.y = dino.groundY;
                dino.velocity = 0;
            }

            game.ground.x += game.SPEED;

            if (Math.random() < 0.02) {
                spawnDinoCloud();
            }

            for (let i = game.clouds.length - 1; i >= 0; i--) {
                game.clouds[i].x -= game.clouds[i].speed;
                if (game.clouds[i].x < -50) {
                    game.clouds.splice(i, 1);
                }
            }

            if (game.obstacles.length === 0 ||
                game.obstacles[game.obstacles.length - 1].x < canvas.width - 300) {
                if (Math.random() < 0.05) {
                    spawnDinoObstacle();
                }
            }

            for (let i = game.obstacles.length - 1; i >= 0; i--) {
                const obs = game.obstacles[i];
                obs.x -= game.SPEED;

                if (obs.x + obs.width < 0) {
                    game.obstacles.splice(i, 1);
                    score++;

                    // Progressive difficulty every 10 obstacles
                    if (score % 10 === 0) {
                        game.SPEED = game.BASE_SPEED + Math.floor(score / 10) * game.SPEED_INC;
                    }
                    continue;
                }

                const dinoBox = { x: dino.x + 5, y: dino.y + 5, width: dino.width - 10, height: dino.height - 10 };
                if (dinoBox.x < obs.x + obs.width &&
                    dinoBox.x + dinoBox.width > obs.x &&
                    dinoBox.y < obs.y + obs.height &&
                    dinoBox.y + dinoBox.height > obs.y) {
                    doGameOver('dino');
                }
            }
        }

        function doGameOver(gameType) {
            gameState = 'gameover';
            shakeTimer = 10;
            flashTimer = 10;
            scoreSaved = false;

            if (gameType === 'dino') {
                if (score > dinoGame.bestScore) {
                    dinoGame.bestScore = score;
                    localStorage.setItem('dinoRunnerBest', dinoGame.bestScore.toString());
                }
            } else {
                if (score > flappyGame.bestScore) {
                    flappyGame.bestScore = score;
                    localStorage.setItem('dinoFlappyBest', flappyGame.bestScore.toString());
                }
            }

            // Show name input if score > 0
            if (score > 0) {
                nameOverlay.style.display = 'block';
                nameInput.value = '';
                nameInput.focus();
            } else {
                scoreSaved = true;
            }
        }

        async function saveScore() {
            const name = nameInput.value.trim();
            if (!name) return;

            const gameType = currentGame;
            try {
                await fetch('/api/scores', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ playerName: name, gameType, score, difficulty: selectedDifficulty })
                });
                leaderboardDifficulty = selectedDifficulty;
                leaderboardTab = gameType;
                await fetchLeaderboard();
            } catch (e) {
                console.error('Failed to save score:', e);
            }

            nameOverlay.style.display = 'none';
            scoreSaved = true;
        }

        function skipSave() {
            nameOverlay.style.display = 'none';
            scoreSaved = true;
        }

        saveBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            saveScore();
        });

        skipBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            skipSave();
        });

        nameInput.addEventListener('keydown', (e) => {
            e.stopPropagation();
            if (e.key === 'Enter') saveScore();
        });

        async function fetchLeaderboard() {
            const d = leaderboardDifficulty;
            try {
                const [dinoRes, flappyRes] = await Promise.all([
                    fetch('/api/scores/dino/' + d),
                    fetch('/api/scores/flappy/' + d)
                ]);
                if (dinoRes.ok) {
                    const data = await dinoRes.json();
                    leaderboardData.dino = Array.isArray(data) ? data : [];
                } else {
                    leaderboardData.dino = [];
                }
                if (flappyRes.ok) {
                    const data = await flappyRes.json();
                    leaderboardData.flappy = Array.isArray(data) ? data : [];
                } else {
                    leaderboardData.flappy = [];
                }
            } catch (e) {
                console.error('Failed to fetch leaderboard:', e);
                leaderboardData = { dino: [], flappy: [] };
            }
        }

        function showLeaderboard() {
            currentGame = 'leaderboard';
            gameState = 'leaderboard';
            fetchLeaderboard();
        }

        let pendingGameType = null;

        function showDifficultySelect(gameType) {
            pendingGameType = gameType;
            currentGame = 'difficulty';
            gameState = 'difficulty';
            diffHover = -1;
        }

        function startGame(gameType) {
            currentGame = gameType;
            score = 0;
            scoreSaved = false;
            nameOverlay.style.display = 'none';

            if (gameType === 'dino') {
                gameState = 'ready';
                dinoGame.SPEED = dinoGame.BASE_SPEED;
                dinoGame.dino.y = dinoGame.dino.groundY;
                dinoGame.dino.velocity = 0;
                dinoGame.obstacles.length = 0;
                dinoGame.clouds.length = 0;
                dinoGame.ground.x = 0;
            } else if (gameType === 'flappy') {
                gameState = 'ready';
                flappyGame.PIPE_SPEED = flappyGame.BASE_PIPE_SPEED;
                flappyGame.PIPE_GAP = flappyGame.BASE_PIPE_GAP;
                flappyGame.pipesPassed = 0;
                flappyGame.dino.y = 300;
                flappyGame.dino.velocity = 0;
                flappyGame.dino.rotation = 0;
                flappyGame.pipes.length = 0;
                spawnFlappyPipe();
            }
        }

        function goToMenu() {
            currentGame = 'menu';
            gameState = 'menu';
            score = 0;
            nameOverlay.style.display = 'none';
            menuHover = -1;
        }

        function update() {
            if (currentGame === 'dino') {
                updateDinoGame();
            } else if (currentGame === 'flappy') {
                updateFlappyGame();
            }
        }

        function gameLoop() {
            try {
                update();
                draw();
            } catch (e) {
                console.error('Game loop error:', e);
            }
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            // Don't handle game keys when typing name
            if (document.activeElement === nameInput) return;

            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();

                if (currentGame === 'flappy') {
                    if (gameState === 'ready') {
                        gameState = 'playing';
                    } else if (gameState === 'playing') {
                        flappyGame.dino.velocity = flappyGame.JUMP_VELOCITY;
                    } else if (gameState === 'gameover' && scoreSaved) {
                        startGame('flappy');
                    }
                } else if (currentGame === 'dino') {
                    if (gameState === 'ready') {
                        gameState = 'playing';
                    } else if (gameState === 'playing') {
                        if (dinoGame.dino.y >= dinoGame.dino.groundY - 1) {
                            dinoGame.dino.velocity = dinoGame.JUMP_VELOCITY;
                        }
                    } else if (gameState === 'gameover' && scoreSaved) {
                        startGame('dino');
                    }
                }
            }

            // Arrow key navigation
            if (e.code === 'ArrowDown') {
                e.preventDefault();
                if (currentGame === 'menu') {
                    menuHover = menuHover < 2 ? menuHover + 1 : 0;
                } else if (currentGame === 'difficulty') {
                    diffHover = diffHover < 2 ? diffHover + 1 : 0;
                } else if (currentGame === 'leaderboard') {
                    const diffs = ['beginner', 'intermediate', 'advanced'];
                    const idx = diffs.indexOf(leaderboardDifficulty);
                    leaderboardDifficulty = diffs[(idx + 1) % 3];
                    fetchLeaderboard();
                }
            }

            if (e.code === 'ArrowUp') {
                e.preventDefault();
                if (currentGame === 'menu') {
                    menuHover = menuHover > 0 ? menuHover - 1 : 2;
                } else if (currentGame === 'difficulty') {
                    diffHover = diffHover > 0 ? diffHover - 1 : 2;
                } else if (currentGame === 'leaderboard') {
                    const diffs = ['beginner', 'intermediate', 'advanced'];
                    const idx = diffs.indexOf(leaderboardDifficulty);
                    leaderboardDifficulty = diffs[(idx + 2) % 3];
                    fetchLeaderboard();
                }
            }

            if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                if (currentGame === 'leaderboard') {
                    e.preventDefault();
                    leaderboardTab = leaderboardTab === 'dino' ? 'flappy' : 'dino';
                }
            }

            // Enter to confirm selection
            if (e.key === 'Enter') {
                if (currentGame === 'menu' && menuHover >= 0) {
                    if (menuHover === 0) showDifficultySelect('dino');
                    else if (menuHover === 1) showDifficultySelect('flappy');
                    else if (menuHover === 2) showLeaderboard();
                } else if (currentGame === 'difficulty' && diffHover >= 0) {
                    const diffs = ['beginner', 'intermediate', 'advanced'];
                    applyDifficulty(pendingGameType, diffs[diffHover]);
                    startGame(pendingGameType);
                }
            }

            if (currentGame === 'leaderboard') {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    leaderboardTab = leaderboardTab === 'dino' ? 'flappy' : 'dino';
                }
                if (e.key === 'd' || e.key === 'D') {
                    const diffs = ['beginner', 'intermediate', 'advanced'];
                    const idx = diffs.indexOf(leaderboardDifficulty);
                    leaderboardDifficulty = diffs[(idx + 1) % 3];
                    fetchLeaderboard();
                }
            }

            if (currentGame === 'menu') {
                if (e.key === '1') showDifficultySelect('dino');
                else if (e.key === '2') showDifficultySelect('flappy');
                else if (e.key === '3') showLeaderboard();
            } else if (currentGame === 'difficulty') {
                if (e.key === '1') {
                    applyDifficulty(pendingGameType, 'beginner');
                    startGame(pendingGameType);
                } else if (e.key === '2') {
                    applyDifficulty(pendingGameType, 'intermediate');
                    startGame(pendingGameType);
                } else if (e.key === '3') {
                    applyDifficulty(pendingGameType, 'advanced');
                    startGame(pendingGameType);
                }
            }

            if ((e.key === 'd' || e.key === 'D') && gameState === 'gameover' && scoreSaved &&
                (currentGame === 'dino' || currentGame === 'flappy')) {
                showDifficultySelect(currentGame);
            }

            if (e.key === 'm' || e.key === 'M' || e.key === 'Escape') {
                if (currentGame !== 'menu') {
                    goToMenu();
                }
            }
        });

        function handleInput(x, y) {
            // Back button (all screens except menu)
            if (currentGame !== 'menu') {
                const b = BACK_BTN;
                if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
                    goToMenu();
                    return;
                }
            }

            if (currentGame === 'leaderboard') {
                // Difficulty buttons: y 40-68
                if (y >= 40 && y <= 68) {
                    if (x >= 17 && x <= 117) { leaderboardDifficulty = 'beginner'; fetchLeaderboard(); }
                    else if (x >= 150 && x <= 250) { leaderboardDifficulty = 'intermediate'; fetchLeaderboard(); }
                    else if (x >= 283 && x <= 383) { leaderboardDifficulty = 'advanced'; fetchLeaderboard(); }
                }
                // Game tabs: y 74-102
                if (y >= 74 && y <= 102) {
                    if (x >= 20 && x <= 180) leaderboardTab = 'dino';
                    else if (x >= 220 && x <= 380) leaderboardTab = 'flappy';
                }
                return;
            }

            if (currentGame === 'menu') {
                if (y > 330 && y < 380) showDifficultySelect('dino');
                else if (y > 385 && y < 435) showDifficultySelect('flappy');
                else if (y > 440 && y < 490) showLeaderboard();
            } else if (currentGame === 'difficulty') {
                if (y > 315 && y < 365) {
                    applyDifficulty(pendingGameType, 'beginner');
                    startGame(pendingGameType);
                } else if (y > 370 && y < 420) {
                    applyDifficulty(pendingGameType, 'intermediate');
                    startGame(pendingGameType);
                } else if (y > 425 && y < 475) {
                    applyDifficulty(pendingGameType, 'advanced');
                    startGame(pendingGameType);
                }
            } else if (currentGame === 'flappy') {
                if (gameState === 'ready') {
                    gameState = 'playing';
                } else if (gameState === 'playing') {
                    flappyGame.dino.velocity = flappyGame.JUMP_VELOCITY;
                } else if (gameState === 'gameover' && scoreSaved) {
                    if (y > 410 && y < 455) {
                        showDifficultySelect('flappy');
                    } else if (y > 455 && y < 495) {
                        goToMenu();
                    } else {
                        startGame('flappy');
                    }
                }
            } else if (currentGame === 'dino') {
                if (gameState === 'ready') {
                    gameState = 'playing';
                } else if (gameState === 'playing') {
                    if (dinoGame.dino.y >= dinoGame.dino.groundY - 1) {
                        dinoGame.dino.velocity = dinoGame.JUMP_VELOCITY;
                    }
                } else if (gameState === 'gameover' && scoreSaved) {
                    if (y > 410 && y < 455) {
                        showDifficultySelect('dino');
                    } else if (y > 455 && y < 495) {
                        goToMenu();
                    } else {
                        startGame('dino');
                    }
                }
            }
        }

        // Use touch events on touch devices, click on desktop — prevent double-fire
        let isTouchDevice = false;

        canvas.addEventListener('click', (e) => {
            if (isTouchDevice) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            handleInput(x, y);
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseX = -1;
            mouseY = -1;
            menuHover = -1;
            diffHover = -1;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isTouchDevice = true;
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;

            // Swipe detection for leaderboard
            if (currentGame === 'leaderboard') {
                if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > Math.abs(dy)) {
                    leaderboardTab = leaderboardTab === 'dino' ? 'flappy' : 'dino';
                    return;
                }
                if (Math.abs(dy) > SWIPE_THRESHOLD && Math.abs(dy) > Math.abs(dx)) {
                    const diffs = ['beginner', 'intermediate', 'advanced'];
                    const i = diffs.indexOf(leaderboardDifficulty);
                    if (dy < 0) {
                        leaderboardDifficulty = diffs[(i + 1) % 3];
                    } else {
                        leaderboardDifficulty = diffs[(i + 2) % 3];
                    }
                    fetchLeaderboard();
                    return;
                }
            }

            // Regular tap: use start position for hit detection
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (touchStartX - rect.left) * scaleX;
            const y = (touchStartY - rect.top) * scaleY;
            handleInput(x, y);
        }, { passive: false });

        // Prevent iOS bounce/scroll on the page
        document.addEventListener('touchmove', (e) => {
            if (e.target === canvas) e.preventDefault();
        }, { passive: false });

        // Hide loading screen once font is ready
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(() => {
                const ls = document.getElementById('loadingScreen');
                ls.classList.add('hidden');
                setTimeout(() => ls.remove(), 400);
            });
        } else {
            // Fallback: hide after 2s if Font Loading API not supported
            setTimeout(() => {
                const ls = document.getElementById('loadingScreen');
                ls.classList.add('hidden');
                setTimeout(() => ls.remove(), 400);
            }, 2000);
        }

        gameLoop();
    </script>
</body>
</html>
